get_object_match_human: |
  # Identity

  You are given one or more images, all showing the same object. Using only the visual information in the images, you must categorize the object into one of the given classes. Do not rely on the object’s ID, image name, or any non-visual metadata.

  # Instructions 

  * Please follow this exact format in your response, without adding or omititng any sections:
      Chain-of-Thought: <your step-by-step reasoning>
      Object Type: <the type of object you believe it is in list>
  * The Object Type must be a list. Example: ['object 1']

  # Examples

  <Information_for_Object_Matching id="example-1">
  Object Description: This object is a white table with four legs.
  Categories: ['table', 'chair', 'sofa', 'bed']
  </Information_for_Object_Matching>

  <assistant_response id="example-1">
  Chain-of-Thought: The given object description says that the object is a white table. Also, all the provided images show the same object from multiple angles. Based on its shape, structure, and appearance, the object is clearly a table. It has a flat rectangular surface supported by four legs, which are characteristic features of a table. The table's surface appears bluish-white in the image, but this is due to the white background and lighting conditions, which cause white surfaces to take on a slight blue tint. Taking this into account, I conclude that the actual color of the table's surface is white.
  Object Type: ['table']
  </assistant_response>

  <Information_for_Object_Matching id="example-2">
  Object Description: This object is a wooden dresser.
  Categories: ['desk', 'cabinet', 'pencil', 'plant']
  </Information_for_Object_Matching>

  <assistant_response id="example-2">
