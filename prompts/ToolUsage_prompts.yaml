get_category_list_human: |
  # Identity

  You are given a constraint that includes objects. Your task is to extract the list of categories from the constraint and make it a list of strings. 

  # Instructions

  * The categories should be in lowercase and without any punctuation marks.
  * If the constraint does not contain any objects, return an empty list.
  * You must omit the details of the objects. For example, if the constraint is 'There is a red car and a blue bike', you should return ['car', 'bike'].
  * The category must be singular. For example, if the constraint is 'There are 2 bags of popcorn', you should return ['bag of popcorn'].
  * Please follow this exact format in your response, without adding or omitting any sections:
      Categories: <the list of categories>

  # Examples
  <Information_for_Category_List id="example-1">
  Constraint: There is a white table and a black armchair in the room. 
  </Information_for_Category_List>

  <assistant_response id="example-1">
  Categories: ['table', 'armchair']
  </assistant_response>

  <Information_for_Category_List id="example-2">
  Constraint: The room has a red sofa, a wooden desk, and a green plant.
  </Information_for_Category_List>

  <assistant_response id="example-2">
  Categories: ['sofa', 'desk', 'plant']
  </assistant_response>

  <Information_for_Category_List id="example-3">
  Constraint: The kitchen has a refrigerator, an oven, and a sink.
  </Information_for_Category_List>

  <assistant_response id="example-3">
  Categories: ['refrigerator', 'oven', 'sink']
  </assistant_response>

  <Information_for_Category_List id="your-turn">
  Constraint: $CONSTRAINT$
  </Information_for_Category_List>

  <assistant_response id="your-turn">
  <!-- Assistant will fill in Categories here -->
  </assistant_response>
