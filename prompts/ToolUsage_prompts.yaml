get_property_description_human: |-
  # Identity
  You will be given an image of a single object or material. Based on the provided conditions, describe the color, shape, and material of the subject in a simple manner.

  # Instructions
  * Refer to the description provided with the image and extract all noticeable characteristics of the subject.
  * You must include the color, shape, and material of the subject (if they are visually obvious).
  * Due to lighting and shadows in the provided image, a white object may appear gray, light blue, or bluish-gray. You must consider it white.
  * If the extracted visual information from the image contradicts the given description, prioritize the visual information.
  * Respond with a single, concise phrase that is as brief and precise as possible.
  * Explain the reasoning behind your judgment of the subject's characteristics.
  * You must follow the exact format below. This is important.
      Chain-of-Thought: <your step-by-step reasoning>
      Description: <a brief description of the color, shape, and material of the given subject>

  <Information_for_Property_Verification id="example-1">
  Object/Material Description: A table with a glass center.
  </Information_for_Property_Verification>

  <assistant_response id="example-1">
  Chain-of-Thought: The given description says "A table with a glass center," so I expect the object to be a table, and its center part to be made of glass. Visually, the table appears to have a rectangular shape and is mainly dark brown in color. The color of the legs is dark colored, and the center is transparent, indicating that it is made of glass. The overall structure is symmetrical and modern in style.
  Description: A rectangular table with a transparent glass center and a dark-colored base.
  </assistant_response>

  <Information_for_Property_Verification id="example-2">
  Object/Material Description: This is an object of a desk, and it has multiple drawers.
  </Information_for_Property_Verification>

  <assistant_response id="example-2">
  Chain-of-Thought: The object is a desk with multiple drawers. All images show the same desk, revealing exactly 7 drawers. The desk appears bluish-gray due to the background lighting, but is actually white. The drawer handles are gold-colored and metallic. The desk is boxy in shape and likely made of painted wood.
  Description: A white desk with a rectangular shape and seven drawers.
  </assistant_response>

  <Information_for_Property_Verification id="example-3">
  Object/Material Description: It is light brown.
  </Information_for_Property_Verification>

  <assistant_response id="example-3">
  Chain-of-Thought: The material in the image is light brown. The surface is smooth and even, indicating a finished or painted surface. Based on the color and texture, it appears to be wooden, possibly a wall or panel. No patterns or shapes are visible beyond the flat surface.
  Description: A light brown material with a smooth wooden surface and no visible patterns.
  </assistant_response>

  <Information_for_Property_Verification id="example-4">
  Object/Material Description: The material is brown.
  </Information_for_Property_Verification>

  <assistant_response id="example-4">
  Chain-of-Thought: The material is brown with a dark tone and visible wood grain texture. The repeating linear patterns and the color tone strongly suggest it is natural wood. The shape is flat and rectangular, possibly a tabletop or flooring.
  Description: A dark brown wooden material with visible wood grain texture in a rectangular shape.
  </assistant_response>

  <Information_for_Property_Verification id="example-5">
  Object/Material Description: This is a white desk. 
  </Information_for_Property_Verification>

  <assistant_response id="example-5">
  Chain-of-Thought: The object is described as a white desk. The images show one desk viewed from different angles. The surface appears bluish-gray due to lighting, but is actually white. The shape is rectangular with four straight legs. It has a smooth surface, suggesting painted wood or laminate. On top of the desk are a yellow ceramic cup, a green daisy plant in a white pot, and a red pencil.
  Description: A white rectangular desk with a smooth surface, holding a yellow cup, a green plant, and a red pencil.
  </assistant_response>

  <Information_for_Property_Verification id="your-turn">
  Object/Material Description: $OBJECT_DESCRIPTION$
  </Information_for_Property_Verification>

  <assistant_response id="your-turn">
  <!-- Assistant will fill in Chain-of-Thought and Description here -->
  </assistant_response>
