  There is a kitchen that has a marble countertop and wooden cabinets. Next to the kitchen, there is a dining area with a round table. The table has four chairs around it. The chairs are tall. They are also blue.

  Constraints:
  1. There is a kitchen and a dining area in the house. 
  2. In the kitchen, there is a countertop and cabinets. 
  3. Next to the kitchen, there is a dining area. 
  4. In the dining area, there is one table and four chairs.
  5.The table in the dining area is round. 
  6. The chairs in the dining area are placed around the table. 
  7. The chairs in the dining area surrounding the table are tall and blue.

