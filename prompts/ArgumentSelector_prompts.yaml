4_human: |
  # Tools

  def get_multiview_rendered_object(objects: list) -> dict:
      """
      Returns rendered images for the specified objects.

      Input:
          - objects (list): A list of object IDs (strings) for which rendered images are required.

      Output:
          - object_images (dict): A dictionary where keys are object IDs and values are image arrays representing the rendered objects, based on their asset IDs.
      """

  def get_topdown_object(objects: list) -> dict:
      """
      Returns object-centric images for the specified objects in the scene. An object-centric image is one where the target object is positioned at the center, while surrounding context, including nearby objects, is also visible. It is useful when figuring out the placement of multiple objects nearby the specific object. It is also useful when trying to look at small objects. It is hard to see the small object in the topdown view image.

      Input:
          - objects (list): A list of object IDs (strings) for which object-centric images are required.

      Output:
          - objectcentric_images (dict): A dictionary where keys are formatted as "closed-up_<distance>m apart topdownview_image" and values are image arrays representing top-down views of the object at specified distances (1.5m, 2m, 2.5m, 3m, 3.5m).
      """

  def get_frontview_object(objects: list) -> dict:
      """
      Returns the frontview image for the specified objects in the scene. A frontview image is one where the target object is positioned at the center, while surrounding context, including nearby objects, is also visible.

      Input:
          - objects (list): A list of object IDs (strings) for which frontview images are required.

